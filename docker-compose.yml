version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: music_app
      MYSQL_USER: teta
      MYSQL_PASSWORD: 1234
      MYSQL_ROOT_PASSWORD: root
    command: --default-authentication-plugin=mysql_native_password  
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - appnet

  backend:
    build: ./backend
    container_name: django_backend
    restart: always
    depends_on: 
     - mysql
    networks: 
    - appnet
    command: sh -c "sleep 10 && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend 
    container_name: react_frontend
    restart: always
    networks:
      - appnet

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80" 
    depends_on:
      - backend
      - frontend
    networks:
    - appnet

volumes:
  mysql_data:

networks:
  appnet:
    driver: bridge